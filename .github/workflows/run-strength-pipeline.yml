name: Run Strength Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - "scripts/model_train.py"
      - "dags/processing_dags/strength_features_dag.py"
      - "dags/processing_dags/strength_model_dag.py"
      - "requirements.txt"
      - ".github/workflows/run-strength-pipeline.yml"
  workflow_dispatch:  # Manual trigger from GitHub UI

env:
  AIRFLOW_HOME: ${{ github.workspace }}
  MODEL_RMSE_THRESHOLD: "15.0"

jobs:
  test:
    name: Lint and unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest ruff

      - name: Fix lint issues
        run: ruff check scripts/model_train.py dags/ --fix

      - name: Lint (ruff)
        run: ruff check scripts/model_train.py dags/

      - name: Run unit tests
        run: pytest tests/ -v --tb=short -m "not slow"

  train:
    name: Train and validate strength model
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt "dvc[gs]"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Pull strength features via DVC
        run: |
          dvc pull data/processed/strength_features.parquet 2>/dev/null || \
            echo "Feature file not in DVC cache — will attempt Kaggle download"

      - name: Download and clean weightlifting data (if features not cached)
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          if [ ! -f data/processed/strength_features.parquet ]; then
            echo "Running feature pipeline via DVC..."
            dvc repro clean_weightlifting
            dvc repro train_strength_model
          else
            echo "Strength features available — proceeding to training only."
          fi

      - name: Train strength model (if features were pre-cached)
        if: ${{ hashFiles('data/processed/strength_features.parquet') != '' }}
        run: |
          mkdir -p data/models/strength
          python scripts/model_train.py \
            --run-id "ci_${{ github.sha }}" \
            --model-type strength \
            --rmse-threshold "${{ env.MODEL_RMSE_THRESHOLD }}"

      - name: Display metrics summary
        run: |
          python - <<'PYEOF'
          import json
          m = json.load(open("data/models/strength/metrics.json"))
          print(f"Winner: {m['winner_model']}")
          print(f"Gate ({m['gate_horizon']}) RMSE: {m['gate_rmse']:.4f}  (threshold={m['rmse_threshold']})")
          print(f"Passed gate: {m['passed_gate']}")
          print("\nModel comparison (d7):")
          for name, metrics in m.get("model_comparison", {}).items():
              print(f"  {name}: RMSE={metrics['d7']['rmse']:.4f}  R2={metrics['d7']['r2']:.4f}")
          print("\nTop SHAP features:", list(m.get("shap_top10", {}).keys())[:5])
          bias = m.get("bias_flagged", [])
          print(f"Bias flags: {len(bias)}" + (f" — {bias}" if bias else " (none)"))
          PYEOF

      - name: Validate bias report
        run: |
          python - <<'PYEOF'
          import json, sys
          b = json.load(open("data/models/strength/bias_report.json"))
          flags = b.get("flagged", [])
          if flags:
              print(f"WARNING: {len(flags)} bias flag(s):")
              for f in flags:
                  print(f"  • {f}")
          else:
              print("No bias flags")
          sys.exit(0)
          PYEOF

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: strength-model-${{ github.sha }}
          path: |
            data/models/strength/metrics.json
            data/models/strength/bias_report.json
            data/models/strength/shap_summary.png
            data/models/strength/plots/
          retention-days: 30

      - name: Notify Slack — training result
        if: always() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python - <<'PYEOF'
          import json, os, urllib.request
          url = os.environ["SLACK_WEBHOOK_URL"]
          try:
              m      = json.load(open("data/models/strength/metrics.json"))
              status = ":large_green_circle: PASSED" if m["passed_gate"] else ":red_circle: FAILED"
              text   = (
                  f"*Strength Model CI — {status}*\n"
                  "Commit: `" + "${{ github.sha }}"[:8] + "`\n"
                  f"Winner: {m['winner_model']}\n"
                  f"Gate RMSE (d7): `{m['gate_rmse']:.4f}` (threshold `{m['rmse_threshold']}`)\n"
                  f"Bias flags: {len(m.get('bias_flagged', []))}"
              )
          except Exception as e:
              text = f":fire: Strength Model CI — ERROR reading metrics: {e}"
          req = urllib.request.Request(
              url, json.dumps({"text": text}).encode(),
              {"Content-Type": "application/json"}, method="POST"
          )
          urllib.request.urlopen(req, timeout=10)
          PYEOF

  deploy:
    name: Push to GCS model registry
    runs-on: ubuntu-latest
    needs: train
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 15
    environment: production

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt "dvc[gs]"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Download model artifacts from CI job
        uses: actions/download-artifact@v4
        with:
          name: strength-model-${{ github.sha }}
          path: data/models/strength/

      - name: Rollback check against deployed model
        env:
          GCS_BACKUP_BUCKET: ${{ vars.GCS_BACKUP_BUCKET }}
        run: |
          python - <<'PYEOF'
          import json, os, subprocess, sys
          bucket   = os.environ["GCS_BACKUP_BUCKET"]
          new_m    = json.load(open("data/models/strength/metrics.json"))
          new_rmse = new_m["gate_rmse"]

          result = subprocess.run(
              ["gsutil", "cat", f"gs://{bucket}/model_registry/strength/latest.json"],
              capture_output=True, text=True
          )
          if result.returncode != 0:
              print("No previous model in registry — first deploy, skipping rollback check.")
              sys.exit(0)

          prev      = json.loads(result.stdout)
          prev_rmse = float(prev.get("gate_rmse", float("inf")))
          threshold = prev_rmse * 1.10

          print(f"Previous model RMSE: {prev_rmse:.4f}")
          print(f"New model RMSE:      {new_rmse:.4f}")
          print(f"Regression threshold: {threshold:.4f}")

          if new_rmse > threshold:
              print(f"ROLLBACK: new model is {(new_rmse/prev_rmse - 1)*100:.1f}% worse. Blocking deploy.")
              sys.exit(1)

          print("Rollback check PASSED.")
          PYEOF

      - name: Push model to GCS registry
        env:
          GCS_BACKUP_BUCKET: ${{ vars.GCS_BACKUP_BUCKET }}
        run: |
          TS=$(date -u +%Y%m%dT%H%M%S)
          PREFIX="gs://${GCS_BACKUP_BUCKET}/model_registry/strength/${TS}"
          echo "Uploading to ${PREFIX}/"

          gsutil cp data/models/strength/metrics.json     "${PREFIX}/metrics.json"
          gsutil cp data/models/strength/bias_report.json "${PREFIX}/bias_report.json"
          gsutil cp data/models/strength/shap_summary.png "${PREFIX}/shap_summary.png" 2>/dev/null || true
          gsutil -m cp -r data/models/strength/plots/     "${PREFIX}/plots/" 2>/dev/null || true

          python - <<PYEOF
          import json, os
          m = json.load(open("data/models/strength/metrics.json"))
          latest = {
              "timestamp": "${TS}",
              "prefix":    "${PREFIX}",
              "git_sha":   "${{ github.sha }}",
              "gate_rmse": m["gate_rmse"],
              "winner":    m["winner_model"],
              "d1_rmse":   m["test_metrics"]["d1"]["rmse"],
              "d14_rmse":  m["test_metrics"]["d14"]["rmse"],
          }
          with open("/tmp/latest.json", "w") as f:
              json.dump(latest, f, indent=2)
          PYEOF

          gsutil cp /tmp/latest.json \
            "gs://${GCS_BACKUP_BUCKET}/model_registry/strength/latest.json"
          echo "Registry push complete: ${PREFIX}"

      - name: DVC track model artifacts
        run: |
          dvc add data/models/strength/
          git config user.email "ci@github-actions"
          git config user.name  "GitHub Actions"
          git add data/models/strength.dvc
          git diff --cached --quiet && echo "Nothing to commit" || \
            git commit -m "chore: update strength model artifact DVC pointer [ci skip]"

      - name: Notify Slack — deploy result
        if: always() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python - <<'PYEOF'
          import json, os, urllib.request
          url    = os.environ["SLACK_WEBHOOK_URL"]
          status = ":rocket: Deployed" if "${{ job.status }}" == "success" else ":fire: Deploy Failed"
          sha_short = "${{ github.sha }}"[:8]
          text   = f"*Strength Model — {status}*\nCommit: `{sha_short}`"
          req = urllib.request.Request(
              url, json.dumps({"text": text}).encode(),
              {"Content-Type": "application/json"}, method="POST"
          )
          urllib.request.urlopen(req, timeout=10)
          PYEOF
