name: DAG Integrity

# Validates all Airflow DAG files for:
#   - Import errors (syntax, missing deps)
#   - Unique dag_ids
#   - Required tags per category
#   - Correct schedule settings
#   - Expected task names in key DAGs
#
# Runs pytest inside the same Docker image used in production so the Python
# environment (including apache-airflow 2.9.3) is identical — no separate
# airflow install step, no dependency conflicts.

on:
  push:
    branches: [main, develop]
    paths:
      - "dags/**"
      - "requirements.txt"
      - "Dockerfile"
      - "tests/test_dag_integrity.py"
      - ".github/workflows/dag_integrity.yml"
  pull_request:
    branches: [main]
    paths:
      - "dags/**"
      - "tests/test_dag_integrity.py"
  workflow_dispatch:

jobs:
  dag-integrity:
    name: DAG structural tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('Dockerfile', 'requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: level-up-airflow:ci
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Run DAG integrity tests
        run: |
          docker run --rm \
            -v "$PWD/dags:/opt/airflow/dags" \
            -v "$PWD/tests:/opt/airflow/tests" \
            -v "$PWD/pytest.ini:/opt/airflow/pytest.ini" \
            -w /opt/airflow \
            -e PYTHONPATH=/opt/airflow/dags \
            -e AIRFLOW__CORE__UNIT_TEST_MODE=true \
            -e AIRFLOW__LOGGING__LOGGING_LEVEL=ERROR \
            -e AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////tmp/airflow_ci.db \
            -e AIRFLOW_VAR_GCS_BACKUP_BUCKET=ci-stub \
            -e AIRFLOW_VAR_FIREBASE_SERVICE_ACCOUNT_PATH=/tmp/stub.json \
            -e AIRFLOW_VAR_BACKUP_PREFIX=stub \
            -e AIRFLOW_VAR_MAX_DOCS_PER_RUN=1000 \
            -e AIRFLOW_VAR_CHUNK_SIZE=100 \
            -e AIRFLOW_VAR_ALERT_WEBHOOK_URL=https://example.com/stub \
            -e AIRFLOW_VAR_MODEL_RMSE_THRESHOLD=10.0 \
            -e AIRFLOW_VAR_BIAS_MAX_RMSE_RATIO=2.0 \
            -e AIRFLOW_VAR_FLEXIBILITY_RMSE_THRESHOLD=10.0 \
            -e AIRFLOW_VAR_STRENGTH_RMSE_THRESHOLD=2000.0 \
            -e KAGGLE_USERNAME=ci \
            -e KAGGLE_KEY=ci \
            level-up-airflow:ci \
            bash -c "echo '{}' > /tmp/stub.json && \
                     pytest tests/test_dag_integrity.py -v --tb=short"
