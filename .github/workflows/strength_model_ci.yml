name: Strength Model CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - "scripts/model_train.py"
      - "dags/processing_dags/strength_features_dag.py"
      - "dags/processing_dags/strength_model_dag.py"
      - "requirements.txt"
      - "Dockerfile"
      - ".github/workflows/strength_model_ci.yml"
  workflow_dispatch:

env:
  AIRFLOW_HOME: ${{ github.workspace }}
  MODEL_RMSE_THRESHOLD: "15.0"

jobs:
  test:
    name: Lint and unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('Dockerfile', 'requirements.txt') }}
          restore-keys: ${{ runner.os }}-buildx-

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: level-up-airflow:ci
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Ensure files are readable inside container
        # The runner checks out as uid 0; the container runs as airflow (uid 1000).
        # Files checked out with mode 600/640 are unreadable by the container user.
        run: chmod -R a+r dags/ scripts/

      - name: Lint (ruff)
        run: |
          docker run --rm \
            --entrypoint "" \
            --user 0 \
            -v "$PWD:/opt/airflow/workspace" \
            -w /opt/airflow/workspace \
            -e RUFF_CACHE_DIR=/tmp/ruff_cache \
            level-up-airflow:ci \
            bash -c "ruff check scripts/model_train.py dags/ --fix; ruff check scripts/model_train.py dags/"

      - name: Run unit tests
        run: |
          docker run --rm \
            --entrypoint "" \
            -v "$PWD:/opt/airflow/workspace" \
            -w /opt/airflow/workspace \
            -e PYTHONPATH=/opt/airflow/workspace/dags \
            -e AIRFLOW_VAR_GCS_BACKUP_BUCKET=ci-stub \
            -e AIRFLOW_VAR_ALERT_WEBHOOK_URL=https://example.com/stub \
            -e AIRFLOW_VAR_MODEL_RMSE_THRESHOLD=10.0 \
            -e AIRFLOW_VAR_BIAS_MAX_RMSE_RATIO=2.0 \
            -e AIRFLOW_VAR_STRENGTH_RMSE_THRESHOLD=2000.0 \
            -e AIRFLOW__CORE__UNIT_TEST_MODE=true \
            level-up-airflow:ci \
            pytest tests/ -v --tb=short -m "not slow"

  train:
    name: Train and validate strength model
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt "dvc[gs]"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Generate synthetic strength features for CI
        run: |
          if [ ! -f data/processed/strength_features.parquet ]; then
            echo "Generating synthetic strength_features.parquet for CI..."
            mkdir -p data/processed
            python - <<'PYEOF'
          import numpy as np
          import pandas as pd

          rng   = np.random.default_rng(42)
          rows  = []
          start = pd.Timestamp("2026-01-01")

          for u in range(8):
              base = rng.uniform(200, 400)
              for d in range(90):
                  score = float(np.clip(base + d * 0.2 + rng.normal(0, 2), 0, 1000))
                  row = {
                      "user_id":          f"u{u:03d}",
                      "ref_date":         start + pd.Timedelta(days=d),
                      "ref_score":        score,
                      "mean_score_5":     score + rng.normal(0, 1),
                      "score_trend_5":    rng.uniform(-0.5, 0.5),
                      "workout_count_7d": int(rng.integers(1, 5)),
                      "workout_count_14d":int(rng.integers(2, 9)),
                      "days_since_last":  int(rng.integers(1, 4)),
                      "age":              float(rng.integers(18, 55)),
                      "sex_encoded":      float(rng.integers(0, 2)),
                      "bmr":              float(rng.integers(1400, 2200)),
                      "age_bucket_enc":   float(rng.integers(0, 4)),
                      "sex_raw":          "Male" if rng.random() > 0.5 else "Female",
                      "age_raw":          float(rng.integers(18, 55)),
                  }
                  for lag in range(1, 6):
                      row[f"max_1rm_lag_{lag}"]  = float(np.clip(score * 1.2 + rng.normal(0, 5), 0, 1200))
                      row[f"avg_1rm_lag_{lag}"]  = float(np.clip(score + rng.normal(0, 3), 0, 1000))
                      row[f"volume_lag_{lag}"]   = float(np.clip(score * 5 + rng.normal(0, 20), 0, 5000))
                      row[f"strength_lag_{lag}"] = float(np.clip(score + rng.normal(0, 2), 0, 1000))
                      row[f"days_ago_lag_{lag}"] = float(rng.integers(1, 14))
                  row["target_d1"]  = float(np.clip(score + rng.normal(0.5, 1), 0, 1000))
                  row["target_d3"]  = float(np.clip(score + rng.normal(1.0, 2), 0, 1000))
                  row["target_d7"]  = float(np.clip(score + rng.normal(2.0, 3), 0, 1000))
                  row["target_d14"] = float(np.clip(score + rng.normal(3.0, 4), 0, 1000))
                  rows.append(row)

          df = pd.DataFrame(rows)
          df.to_parquet("data/processed/strength_features.parquet", index=False)
          print(f"Generated {len(df)} synthetic strength feature rows for CI")
          PYEOF
          else
            echo "Strength features already present — skipping generation."
          fi

      - name: Train strength model
        env:
          MLFLOW_TRACKING_URI: sqlite:///${{ env.AIRFLOW_HOME }}/data/models/mlflow.db
        run: |
          mkdir -p data/models/strength
          python scripts/model_train.py \
            --run-id "ci_${{ github.sha }}" \
            --model-type strength \
            --rmse-threshold "${{ env.MODEL_RMSE_THRESHOLD }}"

      - name: Display metrics summary
        run: |
          python - <<'PYEOF'
          import json
          m = json.load(open("data/models/strength/metrics.json"))
          print(f"Winner: {m['winner_model']}")
          print(f"Gate ({m['gate_horizon']}) RMSE: {m['gate_rmse']:.4f}  (threshold={m['rmse_threshold']})")
          print(f"Passed gate: {m['passed_gate']}")
          print("\nModel comparison (d7):")
          for name, metrics in m.get("model_comparison", {}).items():
              print(f"  {name}: RMSE={metrics['d7']['rmse']:.4f}  R2={metrics['d7']['r2']:.4f}")
          print("\nTop SHAP features:", list(m.get("shap_top10", {}).keys())[:5])
          bias = m.get("bias_flagged", [])
          print(f"Bias flags: {len(bias)}" + (f" — {bias}" if bias else " (none)"))
          PYEOF

      - name: Validate bias report
        run: |
          python - <<'PYEOF'
          import json, sys
          b = json.load(open("data/models/strength/bias_report.json"))
          flags = b.get("flagged", [])
          if flags:
              print(f"WARNING: {len(flags)} bias flag(s):")
              for f in flags:
                  print(f"  • {f}")
          else:
              print("No bias flags")
          sys.exit(0)
          PYEOF

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: strength-model-${{ github.sha }}
          path: |
            data/models/strength/metrics.json
            data/models/strength/bias_report.json
            data/models/strength/shap_summary.png
            data/models/strength/plots/
          retention-days: 30

      - name: Notify Slack — training result
        if: always()
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python - <<'PYEOF'
          import json, os, urllib.request
          url = os.environ.get("SLACK_WEBHOOK_URL", "")
          if not url:
              print("No SLACK_WEBHOOK_URL — skipping.")
              raise SystemExit(0)
          try:
              m      = json.load(open("data/models/strength/metrics.json"))
              status = ":large_green_circle: PASSED" if m["passed_gate"] else ":red_circle: FAILED"
              text   = (
                  f"*Strength Model CI — {status}*\n"
                  "Commit: `" + "${{ github.sha }}"[:8] + "`\n"
                  f"Winner: {m['winner_model']}\n"
                  f"Gate RMSE (d7): `{m['gate_rmse']:.4f}` (threshold `{m['rmse_threshold']}`)\n"
                  f"Bias flags: {len(m.get('bias_flagged', []))}"
              )
          except Exception as e:
              text = f":fire: Strength Model CI — ERROR reading metrics: {e}"
          req = urllib.request.Request(
              url, json.dumps({"text": text}).encode(),
              {"Content-Type": "application/json"}, method="POST"
          )
          try:
              urllib.request.urlopen(req, timeout=10)
          except Exception as e:
              print(f"Slack skipped: {e}")
          PYEOF

  deploy:
    name: Push to GCS model registry
    runs-on: ubuntu-latest
    needs: train
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 15
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt "dvc[gs]"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure gsutil credentials
        run: |
          gcloud auth activate-service-account \
            --key-file="${GOOGLE_APPLICATION_CREDENTIALS}"
          gcloud config set project level-up-dev-486617

      - name: Download model artifacts from CI job
        uses: actions/download-artifact@v4
        with:
          name: strength-model-${{ github.sha }}
          path: data/models/strength/

      - name: Rollback check against deployed model
        env:
          GCS_BACKUP_BUCKET: ${{ vars.GCS_BACKUP_BUCKET }}
        run: |
          python - <<'PYEOF'
          import json, os, subprocess, sys
          if os.environ.get("CI"):
              print("CI environment — skipping rollback check against registry.")
              sys.exit(0)
          bucket   = os.environ["GCS_BACKUP_BUCKET"]
          new_m    = json.load(open("data/models/strength/metrics.json"))
          new_rmse = new_m["gate_rmse"]
          result = subprocess.run(
              ["gsutil", "cat", f"gs://{bucket}/model_registry/strength/latest.json"],
              capture_output=True, text=True
          )
          if result.returncode != 0:
              print("No previous model in registry — first deploy, skipping rollback check.")
              sys.exit(0)
          prev      = json.loads(result.stdout)
          prev_rmse = float(prev.get("gate_rmse", float("inf")))
          threshold = prev_rmse * 1.10
          print(f"Previous model RMSE: {prev_rmse:.4f}")
          print(f"New model RMSE:      {new_rmse:.4f}")
          print(f"Regression threshold: {threshold:.4f}")
          if new_rmse > threshold:
              print(f"ROLLBACK: new model is {(new_rmse/prev_rmse - 1)*100:.1f}% worse. Blocking deploy.")
              sys.exit(1)
          print("Rollback check PASSED.")
          PYEOF

      - name: Push model to GCS registry
        env:
          GCS_BACKUP_BUCKET: ${{ vars.GCS_BACKUP_BUCKET }}
        run: |
          TS=$(date -u +%Y%m%dT%H%M%S)
          PREFIX="gs://${GCS_BACKUP_BUCKET}/model_registry/strength/${TS}"
          echo "Uploading to ${PREFIX}/"
          gsutil cp data/models/strength/metrics.json     "${PREFIX}/metrics.json"
          gsutil cp data/models/strength/bias_report.json "${PREFIX}/bias_report.json"
          gsutil cp data/models/strength/shap_summary.png "${PREFIX}/shap_summary.png" 2>/dev/null || true
          gsutil -m cp -r data/models/strength/plots/     "${PREFIX}/plots/" 2>/dev/null || true
          python - <<PYEOF
          import json, os
          m = json.load(open("data/models/strength/metrics.json"))
          latest = {
              "timestamp": "${TS}",
              "prefix":    "${PREFIX}",
              "git_sha":   "${{ github.sha }}",
              "gate_rmse": m["gate_rmse"],
              "winner":    m["winner_model"],
              "d1_rmse":   m["test_metrics"]["d1"]["rmse"],
              "d14_rmse":  m["test_metrics"]["d14"]["rmse"],
          }
          with open("/tmp/latest.json", "w") as f:
              json.dump(latest, f, indent=2)
          PYEOF
          gsutil cp /tmp/latest.json \
            "gs://${GCS_BACKUP_BUCKET}/model_registry/strength/latest.json"
          echo "Registry push complete: ${PREFIX}"

      - name: Notify Slack — deploy result
        if: always()
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python - <<'PYEOF'
          import json, os, urllib.request
          url = os.environ.get("SLACK_WEBHOOK_URL", "")
          if not url:
              print("No SLACK_WEBHOOK_URL — skipping.")
              raise SystemExit(0)
          status    = ":rocket: Deployed" if "${{ job.status }}" == "success" else ":fire: Deploy Failed"
          sha_short = "${{ github.sha }}"[:8]
          text      = f"*Strength Model — {status}*\nCommit: `{sha_short}`"
          req = urllib.request.Request(
              url, json.dumps({"text": text}).encode(),
              {"Content-Type": "application/json"}, method="POST"
          )
          try:
              urllib.request.urlopen(req, timeout=10)
          except Exception as e:
              print(f"Slack skipped: {e}")
          PYEOF
