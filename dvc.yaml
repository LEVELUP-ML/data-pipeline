# dvc.yaml — Data pipeline stages tracked by DVC
#
# Run the full pipeline:  dvc repro
# Run a single stage:     dvc repro <stage_name>
# Check status:           dvc status
# Push to remote:         dvc push

stages:

  #  Download 

  download_weightlifting:
    cmd: >
      mkdir -p data/raw/weightlifting &&
      kaggle datasets download -d joep89/weightlifting
      -p data/raw/weightlifting --unzip
    outs:
      - data/raw/weightlifting:
          cache: true
          persist: true

  download_wisdm:
    cmd: >
      mkdir -p data/raw/wisdm &&
      python scripts/download_wisdm.py --output-dir data/raw/wisdm
    outs:
      - data/raw/wisdm:
          cache: true
          persist: true

  #  Clean / Process 

  clean_weightlifting:
    cmd: python scripts/clean_weightlifting.py
    deps:
      - data/raw/weightlifting
      - scripts/clean_weightlifting.py
    outs:
      - data/processed/weightlifting_cleaned:
          cache: true
      - data/processed/weightlifting_rejected:
          cache: true
          persist: true
    metrics:
      # summary.json lives inside weightlifting_cleaned — listed only here,
      # not duplicated under outs, to avoid the overlap error
      - data/processed/weightlifting_cleaned/summary.json:
          cache: false

  clean_wisdm:
    cmd: python scripts/clean_wisdm.py
    deps:
      - data/raw/wisdm
      - scripts/clean_wisdm.py
    outs:
      # Track only the clean parquet, not the whole directory, so that
      # compute_stamina can add its own output without an overlap error
      - data/processed/wisdm/wisdm_accel_clean.parquet:
          cache: true
    metrics:
      - data/processed/wisdm/summary.json:
          cache: false

  #  Stamina computation 

  compute_stamina:
    cmd: python scripts/compute_stamina.py
    deps:
      - data/processed/wisdm/wisdm_accel_clean.parquet
      - scripts/compute_stamina.py
    outs:
      - data/processed/wisdm/wisdm_stamina.parquet:
          cache: true
    metrics:
      - data/processed/wisdm/stamina_metrics.json:
          cache: false

  #  Bias analysis 

  bias_analysis:
    cmd: python scripts/bias_analysis.py
    deps:
      - data/processed/wisdm/wisdm_stamina.parquet
      - data/processed/weightlifting_cleaned
      - scripts/bias_analysis.py
    outs:
      - data/processed/bias_reports:
          cache: true
    metrics:
      - data/processed/bias_reports/latest_bias.json:
          cache: false

  #  Flexibility model 

  train_flexibility_model:
    cmd: python scripts/model_train.py
    deps:
      - data/processed/flexibility_features.parquet
      - scripts/model_train.py
    outs:
      - data/models/flexibility/model.pkl:
          cache: true
      - data/models/flexibility/shap_summary.png:
          cache: true
    metrics:
      - data/models/flexibility/metrics.json:
          cache: false
      - data/models/flexibility/bias_report.json:
          cache: false

  #  Tests 

  run_tests:
    cmd: pytest tests/ -v --tb=short --junitxml=data/processed/test_results.xml
    deps:
      - tests/
      - data/processed/flexibility_features.parquet
      - data/processed/wisdm/wisdm_stamina.parquet
      - data/processed/weightlifting_cleaned
    metrics:
      - data/processed/test_results.xml:
          cache: false