# Shared config
x-airflow-common: &airflow-common
  build: .
  user: "${AIRFLOW_UID:-1000}:0"
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow

    # DAG subfolder scanning
    AIRFLOW__CORE__DAG_DISCOVERY_SAFE_MODE: "true"

    # Scheduler tuning
    AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: "60"
    AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL: "30"

    # Logging
    AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
    AIRFLOW__LOGGING__REMOTE_LOGGING: "false"

    # GCP / Firebase
    GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/secrets/gcp-sa.json

    # Kaggle
    KAGGLE_USERNAME: ${KAGGLE_USERNAME:?set KAGGLE_USERNAME}
    KAGGLE_KEY: ${KAGGLE_KEY:?set KAGGLE_KEY}

    # Airflow Variables (injected as env vars)
    AIRFLOW_VAR_GCS_BACKUP_BUCKET: "raw_data_lvlup"
    AIRFLOW_VAR_FIREBASE_SERVICE_ACCOUNT_PATH: "/opt/airflow/secrets/firebase-admin.json"
    AIRFLOW_VAR_BACKUP_PREFIX: "firestore_backups/metric_events"
    AIRFLOW_VAR_MAX_DOCS_PER_RUN: "500000"
    AIRFLOW_VAR_CHUNK_SIZE: "5000"
    AIRFLOW_VAR_ALERT_WEBHOOK_URL: "https://hooks.slack.com/services/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"
    AIRFLOW_VAR_MODEL_RMSE_THRESHOLD: "10.0"
    AIRFLOW_VAR_BIAS_MAX_RMSE_RATIO: "2.0"

    AIRFLOW_VAR_FLEXIBILITY_RMSE_THRESHOLD: "10.0"
    AIRFLOW_VAR_STRENGTH_RMSE_THRESHOLD: "2000.0"
    
    # MLflow — points to the mlflow service inside the compose network
    MLFLOW_TRACKING_URI: "http://mlflow:5000"

  volumes:
    - ./dags:/opt/airflow/dags
    - ./data:/opt/airflow/data
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./.dvc:/opt/airflow/.dvc
    - ./.git:/opt/airflow/.git
    - ./secrets:/opt/airflow/secrets
    - ./data_seeding:/opt/airflow/data_seeding
    - ./scripts:/opt/airflow/scripts

  depends_on:
    postgres:
      condition: service_healthy

# Services
services:
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    environment:
      <<: *airflow-env
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    command: >-
      bash -lc "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com"

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    command: >-
      bash -c "gcloud auth activate-service-account
      --key-file=/opt/airflow/secrets/gcp-sa.json && airflow scheduler"

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    ports:
      - "8081:8080"
    command: >-
      bash -c "gcloud auth activate-service-account
      --key-file=/opt/airflow/secrets/gcp-sa.json && airflow webserver"

  postgres:
    image: postgres:15
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 5s
      timeout: 5s
      retries: 20

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.3
    container_name: airflow-mlflow
    restart: unless-stopped
    user: "1000:0"
    volumes:
      - ./data:/opt/airflow/data
    ports:
      - "5001:5000"
    command: >-
      mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri sqlite:///opt/airflow/data/models/mlflow.db
        --default-artifact-root /opt/airflow/data/models/mlflow_artifacts
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  pgdata: